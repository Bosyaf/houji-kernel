name: Build Xiaomi 14 Houji (Final-Victory-V13)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 rsync wget zip ccache

      - name: Clone MiCode Source (Shennong-U-OSS)
        run: |
          # Resmi MiCode reposunu senin verdigin link üzerinden klonluyoruz
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b shennong-u-oss kernel-source
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Fix Source Code (clidr & hwid)
        run: |
          cd kernel-source
          # 1. KVM 'clidr' Hatasını Tamir Et
          sed -i 's/u64 clidr;/u64 clidr = 0;/g' arch/arm64/kvm/sys_regs.c
          
          # 2. Eksik 'hwid' Kconfig Hatasını Tamir Et
          sed -i '/hwid/d' drivers/misc/Kconfig
          mkdir -p drivers/misc/hwid
          touch drivers/misc/hwid/Kconfig
          touch drivers/misc/hwid/Makefile

      - name: Setup Toolchain (Clang 22)
        run: |
          mkdir -p clang-22
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          wget -qO clang.tar.gz "$CLANG_URL"
          tar -C clang-22 -xzf clang.tar.gz

      - name: Configure Houji (Triple Merge)
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang-22/bin:$PATH
          
          # Zincirleme birleştirme (GKI -> Pineapple -> Houji)
          make O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_GKI.config
          scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/houji_GKI.config
          
          # Caglar Gaming Ayarları
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-Caglar-Gaming-Kernel"/g' out/.config
          {
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_DEFAULT_BBR=y"
            echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\""
            echo "CONFIG_PREEMPT=y"
            echo "CONFIG_KMI_SYMBOL_CHECK=n"
            echo "CONFIG_MODVERSIONS=n"
          } >> out/.config
          
          make O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Build Houji (The End)
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang-22/bin:$PATH
          # KCFLAGS="-Wno-error": Derleyici uyarılarını hataya dönüştürmez, derlemeyi durdurmaz.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- SKIP_ABI=1 KCFLAGS="-Wno-error"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Houji-Caglar-Final-Image
          path: kernel-source/out/arch/arm64/boot/Image
          
