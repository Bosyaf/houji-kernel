name: Build Gaming Kernel (Caglar-No-Wait-V7)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      CCACHE_MAXSIZE: "10G"
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "Gaming-Rig"
      CONFIG: "android14-6.1-LTS"

    steps:
      - name: Initialize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192

      - name: Sync Kernel Source
        run: |
          mkdir -p "$CONFIG" && cd "$CONFIG"
          # Repo init ve sync islemleri (Hizli olmasi icin depth=1)
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+rx repo
          ./repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1-lts
          ./repo sync -c -j$(nproc --all) --no-tags
          cd common && git reset --hard

      - name: Download Clang 22
        run: |
          CLANG_LINK=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          curl -L -o clang-22.tar.gz "$CLANG_LINK"
          mkdir -p $GITHUB_WORKSPACE/clang-22
          tar -xzf clang-22.tar.gz -C $GITHUB_WORKSPACE/clang-22

      - name: Apply KernelSU
        run: |
          cd "$CONFIG"
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Fix Everything (The Real Way)
        run: |
          cd "$CONFIG/common"
          
          echo "1. Hata Veren Guvenlik Kilidlerini (LTO/CFI/KMI) Kapat"
          # Error 2 almamak icin bunlari tamamen 'n' (hayir) yapmamiz lazim
          sed -i 's/CONFIG_LTO_CLANG_THIN=y/CONFIG_LTO_NONE=y/g' arch/arm64/configs/gki_defconfig
          sed -i 's/CONFIG_CFI_CLANG=y/CONFIG_CFI_PERMISSIVE=y/g' arch/arm64/configs/gki_defconfig
          echo "CONFIG_KMI_SYMBOL_CHECK=n" >> arch/arm64/configs/gki_defconfig
          
          echo "2. Debug ve Kasan'i Kapat (Performans Icin)"
          sed -i 's/CONFIG_KASAN=y/CONFIG_KASAN=n/g' arch/arm64/configs/gki_defconfig
          sed -i 's/CONFIG_DEBUG_KERNEL=y/CONFIG_DEBUG_KERNEL=n/g' arch/arm64/configs/gki_defconfig

          echo "3. BBR ve Full Preempt (Istedigin Ozellikler)"
          sed -i '/CONFIG_TCP_CONG/d' arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_BBR=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> arch/arm64/configs/gki_defconfig
          sed -i 's/CONFIG_PREEMPT_VOLUNTARY=y/CONFIG_PREEMPT=y/g' arch/arm64/configs/gki_defconfig
          
          echo "4. Wifi Fix (Modversions Off)"
          sed -i 's/CONFIG_MODVERSIONS=y/CONFIG_MODVERSIONS=n/g' arch/arm64/configs/gki_defconfig
          
          echo "5. Isim: Caglar-Gaming-Kernel"
          sed -i 's/CONFIG_LOCALVERSION="-android14-11"/CONFIG_LOCALVERSION="-Caglar-Gaming-Kernel"/g' arch/arm64/configs/gki_defconfig

      - name: Compile (Fast & Safe)
        run: |
          cd "$CONFIG"
          export PATH="$GITHUB_WORKSPACE/clang-22/bin:$PATH"
          export PATH="/usr/lib/ccache:$PATH"
          cd common
          ccache -C
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" gki_defconfig
          # SKIP_ABI=1: En buyuk hayat kurtarici budur.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" SKIP_ABI=1
          
