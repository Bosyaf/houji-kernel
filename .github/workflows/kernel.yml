name: Build Xiaomi 14 Houji (Official-MiCode-Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git gnupg gperf libelf-dev libncurses-dev libssl-dev python3 rsync unzip wget zip zlib1g-dev

      - name: Clone Official Source (MiCode)
        run: |
          # Senin verdigin resmi linki kullaniyoruz
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b shennong-u-oss kernel-source
          cd kernel-source
          # KernelSU Kurulumu (Root icin)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Setup Toolchain (Clang 22)
        run: |
          mkdir -p clang-22
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          wget -qO clang.tar.gz "$CLANG_URL"
          tar -C clang-22 -xzf clang.tar.gz

      - name: Configure Houji (Using Your Path)
        run: |
          cd kernel-source
          
          # Fotoğrafta gösterdiğin yol: arch/arm64/configs/vendor/houji_GKI.config
          # Bu komut WiFi ve Ekran titremesini cozecek Xiaomi ayarlarını yükler.
          make O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- vendor/houji_GKI.config

          # Caglar Gaming Tweaks
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-Caglar-Gaming-Kernel"/g' out/.config
          {
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_DEFAULT_BBR=y"
            echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\""
            echo "CONFIG_PREEMPT=y"
            echo "CONFIG_KMI_SYMBOL_CHECK=n"
            echo "CONFIG_MODVERSIONS=n"
          } >> out/.config

      - name: Build Houji (The Final Victory)
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang-22/bin:$PATH
          # SKIP_ABI=1: En kritik hamle, Google'ın Error 2 veren kontrolünü burada öldürüyoruz.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- SKIP_ABI=1

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Houji-Caglar-Kernel
          path: kernel-source/out/arch/arm64/boot/Image
          
